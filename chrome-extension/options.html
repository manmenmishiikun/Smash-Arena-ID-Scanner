<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Scan 連携</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --surface-muted: #f0f1f4;
        --border: #e2e4e9;
        --text: #1a1d26;
        --text-secondary: #5c6370;
        --text-tertiary: #8b919c;
        --accent: #1565c0;
        --accent-hover: #0d47a1;
        --success-bg: #e8f5e9;
        --success-text: #1b5e20;
        --error-bg: #fdecea;
        --error-text: #b3261e;
        --warn-bg: #fff8e1;
        --warn-text: #7a4f01;
        --focus-ring: rgba(21, 101, 192, 0.35);
        --radius: 10px;
        --radius-sm: 8px;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        --font: system-ui, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
          "Noto Sans JP", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1c21;
          --surface: #252830;
          --surface-muted: #2d313c;
          --border: #3d424d;
          --text: #eceef2;
          --text-secondary: #a8adb8;
          --text-tertiary: #7a808c;
          --accent: #64b5f6;
          --accent-hover: #90caf9;
          --success-bg: #1b3d24;
          --success-text: #a5d6a7;
          --error-bg: #4a2524;
          --error-text: #ffb4ab;
          --warn-bg: #47371e;
          --warn-text: #ffdf9b;
          --focus-ring: rgba(100, 181, 246, 0.4);
          --shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.45;
        color: var(--text);
        background: var(--bg);
        margin: 0;
        padding: 12px 14px 14px;
        min-width: 300px;
        max-width: 380px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .brand-row img {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        border-radius: 8px;
      }

      .brand-text {
        min-width: 0;
      }

      .app-title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 2px;
        color: var(--text);
      }

      .app-sub {
        margin: 0;
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.35;
      }

      .conn-state {
        margin: 0 0 10px;
        font-size: 12px;
        color: var(--text-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface-muted);
        padding: 8px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .conn-state::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-tertiary);
        flex: 0 0 8px;
      }

      .conn-state.is-success {
        border-color: var(--success-text);
        background: var(--success-bg);
        color: var(--success-text);
      }

      .conn-state.is-success::before {
        background: var(--success-text);
      }

      .conn-state.is-warning {
        border-color: var(--warn-text);
        background: var(--warn-bg);
        color: var(--warn-text);
      }

      .conn-state.is-warning::before {
        background: var(--warn-text);
      }

      .conn-state.is-error {
        border-color: var(--error-text);
        background: var(--error-bg);
        color: var(--error-text);
      }

      .conn-state.is-error::before {
        background: var(--error-text);
      }

      .connection-hint {
        margin: 6px 0 0;
        font-size: 11px;
        color: var(--text-secondary);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 12px 14px;
        margin-bottom: 8px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-tertiary);
      }

      .option-block {
        margin-bottom: 12px;
      }

      .option-block:last-child {
        margin-bottom: 0;
      }

      .option-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .option-head input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 2px 0 0;
        flex-shrink: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .option-text {
        flex: 1;
        min-width: 0;
      }

      .option-title {
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        display: block;
        margin-bottom: 2px;
      }

      .option-desc {
        font-size: 12px;
        color: var(--text-secondary);
        margin: 0;
      }

      .kbd-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .kbd-grid li {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
        color: var(--text);
      }

      .kbd-grid input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 2px 0 0;
        flex-shrink: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .kbd-grid label {
        cursor: pointer;
        font-weight: 500;
      }

      .link-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 4px;
      }

      .btn-inline {
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        color: var(--accent);
        background: var(--surface-muted);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
      }

      .btn-inline:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .text-link {
        background: none;
        border: none;
        padding: 6px 0;
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        cursor: pointer;
        text-decoration: underline;
        font-family: inherit;
      }

      .text-link:hover {
        color: var(--accent-hover);
      }

      #status {
        min-height: 1.1em;
        margin: 8px 0 0;
        font-size: 11px;
        text-align: center;
        color: var(--text-secondary);
        border-radius: var(--radius-sm);
        padding: 4px 6px;
      }

      #status.is-success {
        color: var(--success-text);
        font-weight: 600;
        background: var(--success-bg);
      }

      #status.is-error {
        color: var(--error-text);
        font-weight: 600;
        background: var(--error-bg);
      }

      #status.is-warning {
        color: var(--warn-text);
        font-weight: 600;
        background: var(--warn-bg);
      }

      /* ポート詳細ダイアログ */
      dialog {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0;
        max-width: 320px;
        width: calc(100vw - 32px);
        background: var(--surface);
        color: var(--text);
        box-shadow: var(--shadow);
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.35);
      }

      .dialog-inner {
        padding: 14px 16px 16px;
      }

      .dialog-inner h2 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }

      .field-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      #bridgePort {
        width: 100%;
        max-width: 11rem;
        padding: 8px 10px;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        background: var(--surface-muted);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        outline: none;
      }

      #bridgePort:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      #bridgePort:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .field-error {
        margin: 6px 0 0;
        font-size: 11px;
        color: var(--error-text);
        min-height: 1.2em;
      }

      .default-hint {
        margin: 8px 0 0;
        font-size: 11px;
        color: var(--text-secondary);
      }

      .dialog-actions {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn-dialog {
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface-muted);
        color: var(--text);
      }

      .btn-dialog.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <header class="brand-row">
      <img src="icons/brand-arena-scan-128.png" width="40" height="40" alt="Arena Scan" />
      <div class="brand-text">
        <h1 class="app-title">Arena Scan と連携</h1>
        <p class="app-sub">PC アプリで確定した部屋 ID を、スマメイトの対戦ルーム画面へ渡します。</p>
      </div>
    </header>

    <p class="conn-state" id="connectionState" role="status" aria-live="polite">状態を確認しています…</p>
    <p class="connection-hint" id="connectionHint"></p>

    <section class="card" aria-labelledby="h-opt">
      <h2 id="h-opt" class="section-title">設定</h2>

      <div class="option-block">
        <div class="option-head">
          <input type="checkbox" id="bridgeEnabled" aria-describedby="bridgeEnabled-desc" />
          <div class="option-text">
            <label class="option-title" for="bridgeEnabled">PC アプリと連携する</label>
            <p id="bridgeEnabled-desc" class="option-desc">
              オンにすると、Arena Scan が監視中のときだけこの PC 内でつながります。
            </p>
          </div>
        </div>
      </div>

      <div class="option-block">
        <div class="option-head">
          <input
            type="checkbox"
            id="autoClickMatchingPostBtn"
            aria-describedby="autoClick-desc"
          />
          <div class="option-text">
            <label class="option-title" for="autoClickMatchingPostBtn">反映後に「設定／変更」を自動で押す</label>
            <p id="autoClick-desc" class="option-desc">
              サイトの確認ダイアログはこれまでどおり手動です。規約・運用はご自身の判断でお願いします。
            </p>
          </div>
        </div>
      </div>

      <div class="option-block" aria-labelledby="kb-shortcuts-title">
        <p id="kb-shortcuts-title" class="section-title" style="margin-bottom: 8px">ページ上のキー操作</p>
        <p class="option-desc" style="margin: 0 0 8px">
          他の拡張機能やツールとキーが衝突する場合は、ここで個別にオフにできます。
        </p>
        <ul class="kbd-grid" aria-label="キーボードショートカットの有効キー">
          <li>
            <input type="checkbox" id="keyboardShortcutEnter" checked aria-describedby="kbd-hint-primary" />
            <label for="keyboardShortcutEnter">Enter</label>
          </li>
          <li>
            <input type="checkbox" id="keyboardShortcutSpace" checked aria-describedby="kbd-hint-primary" />
            <label for="keyboardShortcutSpace">Space</label>
          </li>
          <li>
            <input type="checkbox" id="keyboardShortcutEscape" checked aria-describedby="kbd-hint-cancel" />
            <label for="keyboardShortcutEscape">Escape</label>
          </li>
          <li>
            <input type="checkbox" id="keyboardShortcutBackspace" checked aria-describedby="kbd-hint-cancel" />
            <label for="keyboardShortcutBackspace">Backspace</label>
          </li>
        </ul>
        <p id="kbd-hint-primary" class="option-desc" style="margin: 8px 0 0">
          Enter / Space：部屋ID欄での確定・確認ダイアログの OK
        </p>
        <p id="kbd-hint-cancel" class="option-desc" style="margin: 4px 0 0">
          Escape / Backspace：確認ダイアログのキャンセル
        </p>
      </div>

      <div class="link-actions">
        <button type="button" class="btn-inline" id="openPortDetail" disabled>詳細（ポート番号）</button>
        <button type="button" class="text-link" id="openGuide">使い方</button>
      </div>
    </section>

    <p id="status" role="status" aria-live="polite"></p>

    <dialog id="portDetail" aria-labelledby="portDetailTitle">
      <div class="dialog-inner">
        <h2 id="portDetailTitle">連携ポート</h2>
        <label class="field-label" for="bridgePort">番号</label>
        <input
          type="number"
          id="bridgePort"
          min="1"
          max="65535"
          step="1"
          inputmode="numeric"
          aria-describedby="bridgePortError"
        />
        <p class="field-error" id="bridgePortError" role="status" aria-live="polite"></p>
        <p class="default-hint" id="defaultPortHint"></p>
        <div class="dialog-actions">
          <button type="button" class="btn-dialog" id="portDetailCancel">キャンセル</button>
          <button type="button" class="btn-dialog primary" id="portDetailOk">完了</button>
        </div>
      </div>
    </dialog>

    <script src="constants.js"></script>
    <script src="options.js"></script>
  </body>
</html>
